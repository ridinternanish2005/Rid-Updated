<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Submit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,sans-serif;
background:#f4f6f9;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}
.card{
width:100%;
max-width:520px;
background:#fff;
border-radius:20px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
text-align:center;
}
.icon{
width:80px;height:80px;
margin:0 auto 20px;
border-radius:50%;
background:#eef4ff;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}
h2{
color:#1e293b;
margin-bottom:12px;
font-size:28px;
}
p{
color:#64748b;
font-size:16px;
line-height:1.6;
margin-bottom:30px;
}
.btns{
display:flex;
gap:12px;
}
button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.2s;
}
#sure{
background:#2563eb;
color:white;
}
#sure:hover{transform:translateY(-2px)}
#cancel{
background:#eef2f7;
color:#334155;
}
#cancel:hover{background:#e2e8f0}
@media(max-width:480px){
.card{padding:25px}
.btns{flex-direction:column}
}
</style>
</head>
<body>
<div class="card">
<div class="icon">📝</div>
<h2>Submit Test</h2>
<p>Are you sure you want to submit your test? Once submitted, your answers will be recorded and cannot be changed.</p>
<div class="btns">
<button id="cancel">Cancel</button>
<button id="sure">Submit Test</button>
</div>
</div>
<script>
document.getElementById("sure").addEventListener("click", function() {
window.location.href="/testsubmitedbyteacher/advance-results.html";
});
document.getElementById("cancel").addEventListener("click", function() {
window.history.back();
});
</script>
</body>
</html>
