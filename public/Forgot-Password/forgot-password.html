<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Forgot Password</title>
    <link rel="icon" type="image/png" href="/assets/signup.png">
    <style>
        /* ========== RESET & GLOBAL ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* main card */
        .forgot-container {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .forgot-container:hover {
            transform: translateY(-3px);
        }

        /* header */
        .card-header {
            background: #084887;
            padding: 24px 20px;
            text-align: center;
        }

        .card-header h1 {
            color: white;
            font-size: clamp(1.6rem, 6vw, 2rem);
            font-weight: 600;
            letter-spacing: -0.3px;
            margin: 0;
        }

        .card-header p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* form body */
        .card-body {
            padding: 32px 28px 40px;
        }

        .form-group {
            margin-bottom: 28px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e2a3e;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            background-color: #fefefe;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: #084887;
            box-shadow: 0 0 0 3px rgba(8, 72, 135, 0.2);
        }

        /* button */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #084887;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .btn-submit:hover {
            background-color: #063a6b;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* error message */
        .error-message {
            color: #e53e3e;
            font-size: 0.85rem;
            margin-top: 16px;
            text-align: center;
            background: #fff5f5;
            padding: 10px;
            border-radius: 12px;
            display: none;
        }

        /* footer back link */
        .back-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
        }

        .back-link a {
            color: #084887;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link a:hover {
            text-decoration: underline;
            color: #022b4f;
        }

        /* responsive touches */
        @media (max-width: 500px) {
            .card-body {
                padding: 24px 20px 32px;
            }
            .form-group input {
                padding: 12px 14px;
            }
            .btn-submit {
                padding: 12px;
            }
        }

        /* small height */
        @media (max-height: 550px) {
            body {
                align-items: flex-start;
                padding-top: 30px;
            }
        }
    </style>
</head>

<body>
    <div class="forgot-container">
        <div class="card-header">
            <h1>Forgot Password?</h1>
            <p>Enter your email to receive OTP</p>
        </div>
        <div class="card-body">
            <form id="forgotPasswordForm" action="/auth/forgot-password" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
                </div>
                <button type="submit" class="btn-submit">Send Reset Link</button>
                <div class="error-message" id="error-message"></div>
            </form>
            <div class="back-link">
                <a href="/login">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        // backend connection unchanged – only UI improved
        const form = document.getElementById('forgotPasswordForm');
        const errorDiv = document.getElementById('error-message');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = document.querySelector('#email').value.trim();
            if (!email) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Please enter your email address.';
                return;
            }

            // hide previous error
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email }),
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message || 'OTP sent successfully!');
                    // redirect to reset-password page with email parameter
                    window.location.href = `/reset-password?email=${encodeURIComponent(email)}`;
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = data.message || 'Failed to send OTP. Please try again.';
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Network error. Please check your connection.';
            }
        });
    </script>
</body>

</html>
